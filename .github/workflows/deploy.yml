name: Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Assuming Vercel GitHub Integration handles actual deployment
      # This job is for post-deploy verification or staging tests
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        working-directory: ./no-show-killer
        run: npm ci

      - name: Build Check
        working-directory: ./no-show-killer
        run: npm run build
